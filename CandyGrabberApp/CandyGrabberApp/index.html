<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Candy Grabber - System Access</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
      /* 2. Resetovanje margina i sprečavanje skrolovanja */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020617; /* Tamna boja da se ne vidi beli blic pri učitavanju */
      }

      canvas {
        display: block;
      }

      /* 3. Globalni stil za tvoje HTML inpute da bi izgledali čistije */
      input::placeholder {
        color: rgba(56, 189, 248, 0.4) !important;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 2px;
      }
      
      /* Sakrij strelice za number input ako ih budeš koristio */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
